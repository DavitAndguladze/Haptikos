<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haptikos</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <h1 class="title">Haptikos</h1>

    <!-- Radial visualizer + controls -->
    <section class="viz-section">
      <canvas id="visualizer"></canvas>

      <div class="controls">
        <div class="mode-row">
          <button id="startBtn">Start Listening</button>
          <button id="spotifyBtn" class="btn-spotify">Connect Spotify</button>
        </div>
        <p class="audio-hint" id="audioHint">Chrome will ask you to share your screen — pick <strong>Entire Screen</strong>, check <strong>"Share system audio"</strong>, then click Share.</p>
        <p class="spotify-track" id="spotifyTrack" style="display:none"></p>
        <div class="status" id="statusLine">
          <span id="statusDot" class="dot dot--idle"></span>
          <span id="statusText">Inactive</span>
        </div>
        <div class="sync-row">
          <span id="bpmBadge" class="bpm-badge" style="display:none"></span>
          <label class="sync-label" for="syncLeadSlider">Sync Lead</label>
          <input id="syncLeadSlider" class="sync-slider" type="range"
                 min="0" max="400" step="5" value="100"
                 aria-label="Audio pipeline latency compensation in milliseconds">
          <span id="syncLeadDisplay" class="sync-value">+100ms</span>
        </div>
      </div>
    </section>

    <!-- Bottom 2-column grid -->
    <div class="bottom-grid">

      <!-- Left card: QR pairing -->
      <div class="card">
        <p class="card-title">Connect your Phone</p>
        <div class="qr-body">
          <!--
            /qr returns a PNG from the server.
            The onerror handler hides the img and shows the placeholder.
          -->
          <img id="qrCode" src="/qr" alt="QR code to connect phone"
               onerror="this.style.display='none';
                        document.getElementById('qrPlaceholder').style.display='flex'">
          <div id="qrPlaceholder" class="qr-placeholder">
            QR code will appear when the server is running
          </div>
          <p class="scan-hint">Scan with your iPhone</p>
          <p class="phones-count" id="phonesCount">
            <span id="phoneCount">0</span> phones connected
          </p>
        </div>
      </div>

      <!-- Right card: event log -->
      <div class="card">
        <p class="card-title">Event Log</p>
        <ul id="eventLog" class="log-list" aria-live="polite" aria-label="Detected audio events">
          <li class="log-empty">No events detected yet</li>
        </ul>
      </div>

    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="spotify.js"></script>
  <script src="app.js"></script>
</body>
</html>
