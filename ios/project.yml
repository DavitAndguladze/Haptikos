name: Haptikos
options:
  bundleIdPrefix: com.codesociety
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.1"

targets:
  Haptikos:
    type: application
    platform: iOS
    sources:
      - HapticSense
    settings:
      base:
        INFOPLIST_KEY_NSCameraUsageDescription: "Camera access is needed to scan the server QR code for pairing."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: SocketIO
        product: SocketIO
      - framework: CoreHaptics.framework
        implicit: true
      - framework: AVFoundation.framework
        implicit: true
